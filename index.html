<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NAME</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Courier+Prime:wght@400;700&display=swap');

    :root {
      --bg: #f5f0d8;
      --button-yellow: #f5c518;
      --button-glow: #ffe066;
      --black: #1a1a1a;
      --shadow: rgba(60, 40, 0, 0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      background-color: var(--bg);
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 38px, rgba(180,160,80,0.07) 38px, rgba(180,160,80,0.07) 39px),
        repeating-linear-gradient(90deg, transparent, transparent 38px, rgba(180,160,80,0.07) 38px, rgba(180,160,80,0.07) 39px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier Prime', monospace;
      overflow: hidden;
      position: relative;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(100,80,0,0.18) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: #e8e0b8;
      border: 3px solid var(--black);
      border-radius: 6px;
      padding: 44px 60px 40px 60px;
      box-shadow: 6px 6px 0px var(--black), 0 8px 40px var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .panel-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7a6a30;
      border-bottom: 1.5px solid #bba84a;
      padding-bottom: 10px;
      width: 100%;
      text-align: center;
    }

    /* ── OUTER BLACK BODY (static, never moves) ── */
    .btn-outer {
      position: relative;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #3a3a3a 0%, #111 55%, #000 100%);
      box-shadow: 0 6px 20px rgba(0,0,0,0.55);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glow radiates from the body */
    .btn-outer.glowing {
      box-shadow:
        0 6px 20px rgba(0,0,0,0.55),
        0 0 40px 18px rgba(255,220,0,0.55),
        0 0 90px 40px rgba(255,200,0,0.28),
        0 0 140px 60px rgba(255,180,0,0.12);
    }

    /* ── INNER RING (thin collar between body and cap) ── */
    .btn-ring {
      width: 182px;
      height: 182px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #222 0%, #0a0a0a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
    }

    /* ── YELLOW CAP — this is the part that bobs ── */
    .name-btn {
      position: relative;
      width: 162px;
      height: 162px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 36%, #ffe87a 0%, var(--button-yellow) 55%, #c9a400 100%);
      border: none;
      box-shadow:
        inset 0 2px 8px rgba(255,255,200,0.5),
        0 3px 8px rgba(0,0,0,0.4);
      cursor: pointer;
      font-family: 'Bangers', cursive;
      font-size: 2.4rem;
      letter-spacing: 0.12em;
      color: var(--black);
      text-transform: uppercase;
      outline: none;
      transition: box-shadow 0.25s ease, background 0.25s ease, filter 0.25s ease, transform 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      pointer-events: none;
    }

    .name-btn::before {
      content: '';
      position: absolute;
      top: 18%;
      left: 22%;
      width: 38%;
      height: 22%;
      background: rgba(255,255,220,0.55);
      border-radius: 50%;
      filter: blur(4px);
      pointer-events: none;
    }

    /* Only the cap lifts on hover */
    .btn-outer:hover:not(.pressing) .name-btn {
      transform: translateY(-2px);
    }

    /* Only the cap bobs on press */
    .btn-outer.pressing .name-btn {
      animation: btn-bob 0.28s ease-in-out;
    }

    @keyframes btn-bob {
      0%   { transform: translateY(0)    scale(1);    }
      30%  { transform: translateY(5px)  scale(0.97); }
      65%  { transform: translateY(-4px) scale(1.02); }
      100% { transform: translateY(0)    scale(1);    }
    }

    /* Glow on the cap */
    .btn-outer.glowing .name-btn {
      background: radial-gradient(circle at 38% 36%, #ffffff 0%, #ffee88 30%, var(--button-glow) 65%, #e6c200 100%);
      box-shadow:
        inset 0 2px 8px rgba(255,255,200,0.7),
        0 3px 8px rgba(0,0,0,0.4);
      filter: brightness(1.12);
    }

    /* COUNTER */
    .counter-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      display: flex;
      justify-content: center;
      padding-bottom: 28px;
      pointer-events: none;
    }

    .counter-box {
      background: #1a1a1a;
      color: #f5c518;
      font-family: 'Courier Prime', monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 2.5px solid #f5c518;
      border-radius: 4px;
      padding: 8px 28px 7px 28px;
      box-shadow: 3px 3px 0 #f5c518;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .counter-label {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      color: #f5c518;
    }

    .counter-num {
      font-size: 1.35rem;
      min-width: 2ch;
      text-align: right;
      color: #f5c518;
      display: inline-block;
      transition: text-shadow 0.25s ease, color 0.25s ease;
    }

    .counter-num.pop {
      animation: counter-pop 0.28s ease-in-out;
    }

    @keyframes counter-pop {
      0%   { transform: scale(1);    }
      30%  { transform: scale(1.55); }
      65%  { transform: scale(0.92); }
      100% { transform: scale(1);    }
    }

    .counter-num.glowing {
      color: #fff87a;
      text-shadow:
        0 0 8px rgba(255,220,0,0.9),
        0 0 20px rgba(255,200,0,0.7),
        0 0 40px rgba(255,180,0,0.4);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,220,0,0.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 5;
      animation: flash-bloom 0.8s ease-in-out forwards;
    }
    @keyframes flash-bloom {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="panel">
      <div class="panel-label">The Button That Says The Name Of The Player Playing The Game</div>
      <!-- Outer black body ring -->
      <div class="btn-outer" id="nameBtn">
        <!-- Inner black ring (cap edge) -->
        <div class="btn-ring">
          <button class="name-btn" tabindex="-1" aria-label="NAME button">NAME</button>
        </div>
      </div>
    </div>
  </div>

  <div class="counter-wrap">
    <div class="counter-box">
      <span class="counter-label">Times pressed</span>
      <span class="counter-num" id="counterNum">0</span>
    </div>
  </div>

  <audio id="jimAudio" src="jim.mp3" preload="auto"></audio>

  <script>
    const btnOuter   = document.getElementById('nameBtn');
    const counterNum = document.getElementById('counterNum');
    const audio      = document.getElementById('jimAudio');

    let count = 0;
    let glowTimer   = null;
    let pressLocked = false;

    function triggerPress() {
      if (pressLocked) return;
      pressLocked = true;

      count++;
      counterNum.textContent = count;

      // Counter pop + glow
      counterNum.classList.remove('pop', 'glowing');
      void counterNum.offsetWidth;
      counterNum.classList.add('pop', 'glowing');

      // Button bob + glow
      btnOuter.classList.remove('pressing', 'glowing');
      void btnOuter.offsetWidth;
      btnOuter.classList.add('pressing', 'glowing');

      // Screen flash
      const flash = document.createElement('div');
      flash.className = 'flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 800);

      // Audio
      audio.currentTime = 0;
      audio.play().catch(() => {});

      if (glowTimer) clearTimeout(glowTimer);
      glowTimer = setTimeout(() => {
        btnOuter.classList.remove('glowing');
        counterNum.classList.remove('glowing');
        pressLocked = false;
      }, 520);
    }

    btnOuter.addEventListener('click', triggerPress);
    btnOuter.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') triggerPress(); });
  </script>
</body>
</html>
