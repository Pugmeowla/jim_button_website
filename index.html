<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NAME</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Courier+Prime:wght@400;700&display=swap');

    :root {
      --bg: #f5f0d8;
      --button-yellow: #f5c518;
      --button-glow: #ffe066;
      --black: #1a1a1a;
      --shadow: rgba(60, 40, 0, 0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      background-color: var(--bg);
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 38px, rgba(180,160,80,0.07) 38px, rgba(180,160,80,0.07) 39px),
        repeating-linear-gradient(90deg, transparent, transparent 38px, rgba(180,160,80,0.07) 38px, rgba(180,160,80,0.07) 39px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier Prime', monospace;
      overflow-x: hidden;
      position: relative;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(100,80,0,0.18) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAME ENTRY OVERLAY ── */
    #nameOverlay {
      position: fixed;
      inset: 0;
      background: rgba(245,240,216,0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .name-entry-box {
      background: #e8e0b8;
      border: 3px solid var(--black);
      border-radius: 6px;
      padding: 40px 50px;
      box-shadow: 6px 6px 0 var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    .name-entry-box h2 {
      font-family: 'Bangers', cursive;
      font-size: 2.2rem;
      letter-spacing: 0.1em;
      color: var(--black);
    }

    .name-entry-box p {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7a6a30;
    }

    #playerNameInput {
      font-family: 'Courier Prime', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #f5f0d8;
      border: 2.5px solid var(--black);
      border-radius: 4px;
      padding: 10px 18px;
      width: 220px;
      text-align: center;
      outline: none;
      color: var(--black);
    }

    #playerNameInput:focus {
      border-color: var(--button-yellow);
      box-shadow: 0 0 0 3px rgba(245,197,24,0.3);
    }

    #startBtn {
      font-family: 'Bangers', cursive;
      font-size: 1.5rem;
      letter-spacing: 0.12em;
      background: var(--button-yellow);
      border: 3px solid var(--black);
      border-radius: 4px;
      padding: 8px 36px;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--black);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #startBtn:hover  { transform: translateY(-2px); box-shadow: 4px 6px 0 var(--black); }
    #startBtn:active { transform: translateY(2px);  box-shadow: 2px 2px 0 var(--black); }

    .name-error {
      font-size: 0.72rem;
      color: #c0392b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-height: 1em;
    }

    /* ── LEADERBOARD ── */
    #leaderboard {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 10;
      display: flex;
      justify-content: center;
      padding: 14px 16px 0;
      pointer-events: none;
    }

    .lb-box {
      background: #1a1a1a;
      border: 2.5px solid #f5c518;
      border-radius: 4px;
      box-shadow: 3px 3px 0 #f5c518;
      padding: 10px 20px 12px;
      min-width: 280px;
      max-width: 500px;
      width: 100%;
    }

    .lb-title {
      font-family: 'Bangers', cursive;
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: #f5c518;
      text-align: center;
      border-bottom: 1px solid rgba(245,197,24,0.3);
      padding-bottom: 6px;
      margin-bottom: 8px;
    }

    .lb-rows { display: flex; flex-direction: column; gap: 4px; }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Courier Prime', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #f5c518;
    }

    .lb-row.me { color: #fff87a; }

    .lb-rank  { width: 18px; text-align: right; opacity: 0.5; font-size: 0.7rem; }
    .lb-medal { font-size: 0.9rem; width: 18px; text-align: center; }
    .lb-name  { flex: 1; }
    .lb-score { font-size: 1rem; min-width: 3ch; text-align: right; }

    .lb-empty {
      font-family: 'Courier Prime', monospace;
      font-size: 0.72rem;
      color: rgba(245,197,24,0.4);
      text-align: center;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 0;
    }

    .lb-live {
      display: flex;
      align-items: center;
      gap: 5px;
      justify-content: flex-end;
      margin-top: 6px;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,197,24,0.45);
    }

    .lb-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── SCENE ── */
    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
      margin-top: 20px;
    }

    .panel {
      background: #e8e0b8;
      border: 3px solid var(--black);
      border-radius: 6px;
      padding: 44px 60px 40px 60px;
      box-shadow: 6px 6px 0px var(--black), 0 8px 40px var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .panel-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7a6a30;
      border-bottom: 1.5px solid #bba84a;
      padding-bottom: 10px;
      width: 100%;
      text-align: center;
    }

    /* ── BUTTON ── */
    .btn-outer {
      position: relative;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #3a3a3a 0%, #111 55%, #000 100%);
      box-shadow: 0 6px 20px rgba(0,0,0,0.55);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-outer.glowing {
      box-shadow:
        0 6px 20px rgba(0,0,0,0.55),
        0 0 40px 18px rgba(255,220,0,0.55),
        0 0 90px 40px rgba(255,200,0,0.28),
        0 0 140px 60px rgba(255,180,0,0.12);
    }

    .btn-ring {
      width: 182px; height: 182px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #222 0%, #0a0a0a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
    }

    .name-btn {
      position: relative;
      width: 162px; height: 162px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 36%, #ffe87a 0%, var(--button-yellow) 55%, #c9a400 100%);
      border: none;
      box-shadow: inset 0 2px 8px rgba(255,255,200,0.5), 0 3px 8px rgba(0,0,0,0.4);
      cursor: pointer;
      font-family: 'Bangers', cursive;
      font-size: 2.4rem;
      letter-spacing: 0.12em;
      color: var(--black);
      text-transform: uppercase;
      outline: none;
      transition: box-shadow 0.25s ease, background 0.25s ease, filter 0.25s ease, transform 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      pointer-events: none;
    }

    .name-btn::before {
      content: '';
      position: absolute;
      top: 18%; left: 22%;
      width: 38%; height: 22%;
      background: rgba(255,255,220,0.55);
      border-radius: 50%;
      filter: blur(4px);
      pointer-events: none;
    }

    .btn-outer:hover:not(.pressing) .name-btn { transform: translateY(-2px); }

    .btn-outer.pressing .name-btn { animation: btn-bob 0.28s ease-in-out; }

    @keyframes btn-bob {
      0%   { transform: translateY(0)    scale(1);    }
      30%  { transform: translateY(5px)  scale(0.97); }
      65%  { transform: translateY(-4px) scale(1.02); }
      100% { transform: translateY(0)    scale(1);    }
    }

    .btn-outer.glowing .name-btn {
      background: radial-gradient(circle at 38% 36%, #ffffff 0%, #ffee88 30%, var(--button-glow) 65%, #e6c200 100%);
      box-shadow: inset 0 2px 8px rgba(255,255,200,0.7), 0 3px 8px rgba(0,0,0,0.4);
      filter: brightness(1.12);
    }

    /* ── COUNTER ── */
    .counter-wrap {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      z-index: 10;
      display: flex;
      justify-content: center;
      padding-bottom: 28px;
      pointer-events: none;
    }

    .counter-box {
      background: #1a1a1a;
      color: #f5c518;
      font-family: 'Courier Prime', monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 2.5px solid #f5c518;
      border-radius: 4px;
      padding: 8px 28px 7px;
      box-shadow: 3px 3px 0 #f5c518;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .counter-label { font-size: 0.78rem; letter-spacing: 0.22em; color: #f5c518; }

    .counter-num {
      font-size: 1.35rem;
      min-width: 2ch;
      text-align: right;
      color: #f5c518;
      display: inline-block;
      transition: text-shadow 0.25s ease, color 0.25s ease;
    }

    .counter-num.pop { animation: counter-pop 0.28s ease-in-out; }

    @keyframes counter-pop {
      0%   { transform: scale(1);    }
      30%  { transform: scale(1.55); }
      65%  { transform: scale(0.92); }
      100% { transform: scale(1);    }
    }

    .counter-num.glowing {
      color: #fff87a;
      text-shadow: 0 0 8px rgba(255,220,0,0.9), 0 0 20px rgba(255,200,0,0.7), 0 0 40px rgba(255,180,0,0.4);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,220,0,0.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 5;
      animation: flash-bloom 0.8s ease-in-out forwards;
    }
    @keyframes flash-bloom { 0%{opacity:0} 20%{opacity:1} 100%{opacity:0} }
  </style>
</head>
<body>

  <div id="nameOverlay">
    <div class="name-entry-box">
      <h2>Who are you?</h2>
      <p>Enter your name to join the leaderboard</p>
      <input id="playerNameInput" type="text" maxlength="18" placeholder="YOUR NAME" autocomplete="off" spellcheck="false" />
      <div class="name-error" id="nameError"></div>
      <button id="startBtn">START</button>
    </div>
  </div>

  <div id="leaderboard">
    <div class="lb-box">
      <div class="lb-title">⬛ Hall of Pressers ⬛</div>
      <div class="lb-rows" id="lbRows"><div class="lb-empty">Loading...</div></div>
      <div class="lb-live"><div class="lb-dot"></div> live</div>
    </div>
  </div>

  <div class="scene">
    <div class="panel">
      <div class="panel-label">The Button That Says The Name Of The Player Playing The Game 2</div>
      <div class="btn-outer" id="nameBtn">
        <div class="btn-ring">
          <button class="name-btn" tabindex="-1" aria-label="NAME button">NAME</button>
        </div>
      </div>
    </div>
  </div>

  <div class="counter-wrap">
    <div class="counter-box">
      <span class="counter-label">Times pressed</span>
      <span class="counter-num" id="counterNum">0</span>
    </div>
  </div>

  <audio id="jimAudio" src="jim.mp3" preload="auto"></audio>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyD6VkwRFhKw6O1bCE7Pd8Bu2bkro9SBj50",
      authDomain:        "jim-button-website.firebaseapp.com",
      databaseURL:       "https://jim-button-website-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:         "jim-button-website",
      storageBucket:     "jim-button-website.firebasestorage.app",
      messagingSenderId: "730364066720",
      appId:             "1:730364066720:web:dc98174a79cc6d7f7c02c5",
      measurementId:     "G-934JX58315"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    const btnOuter  = document.getElementById('nameBtn');
    const counterNum= document.getElementById('counterNum');
    const audio     = document.getElementById('jimAudio');
    const lbRows    = document.getElementById('lbRows');
    const overlay   = document.getElementById('nameOverlay');
    const nameInput = document.getElementById('playerNameInput');
    const nameError = document.getElementById('nameError');
    const startBtn  = document.getElementById('startBtn');

    let playerName  = '';
    let myScore     = 0;
    let glowTimer   = null;
    let pressLocked = false;

    // ── Leaderboard render ──
    function renderLeaderboard(data) {
      if (!data) { lbRows.innerHTML = '<div class="lb-empty">No presses yet — be first!</div>'; return; }
      const sorted = Object.entries(data).sort((a,b) => b[1]-a[1]);
      const medals = ['🥇','🥈','🥉'];
      lbRows.innerHTML = sorted.slice(0,8).map(([name,score],i) => `
        <div class="lb-row ${name===playerName?'me':''}">
          <span class="lb-rank">${i+1}.</span>
          <span class="lb-medal">${medals[i]||''}</span>
          <span class="lb-name">${esc(name)}${name===playerName?' ◀':''}</span>
          <span class="lb-score">${score}</span>
        </div>`).join('');
    }

    function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ── Start session ──
    async function startSession() {
      const raw = nameInput.value.trim();
      if (!raw) { nameError.textContent = 'Please enter a name'; return; }
      playerName = raw.toUpperCase();

      // Load existing score for this player
      const snap = await get(ref(db, `scores/${playerName}`));
      myScore = snap.exists() ? snap.val() : 0;
      counterNum.textContent = myScore;

      overlay.style.display = 'none';

      // Live listener — updates leaderboard in real time for everyone
      onValue(ref(db, 'scores'), snap => renderLeaderboard(snap.val()));
    }

    startBtn.addEventListener('click', startSession);
    nameInput.addEventListener('keydown', e => { if(e.key==='Enter') startSession(); });

    // ── Button press ──
    async function triggerPress() {
      if (pressLocked || !playerName) return;
      pressLocked = true;

      myScore++;
      counterNum.textContent = myScore;

      // Atomic increment in Firebase
      runTransaction(ref(db, `scores/${playerName}`), current => (current||0) + 1);

      // Counter pop + glow
      counterNum.classList.remove('pop','glowing');
      void counterNum.offsetWidth;
      counterNum.classList.add('pop','glowing');

      // Button bob + glow
      btnOuter.classList.remove('pressing','glowing');
      void btnOuter.offsetWidth;
      btnOuter.classList.add('pressing','glowing');

      // Flash
      const flash = document.createElement('div');
      flash.className = 'flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 800);

      // Audio
      audio.currentTime = 0;
      audio.play().catch(()=>{});

      if (glowTimer) clearTimeout(glowTimer);
      glowTimer = setTimeout(() => {
        btnOuter.classList.remove('glowing');
        counterNum.classList.remove('glowing');
        pressLocked = false;
      }, 520);
    }

    btnOuter.addEventListener('click', triggerPress);
    btnOuter.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') triggerPress(); });
  </script>
</body>
</html>
